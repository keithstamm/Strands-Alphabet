<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Alphabet Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --c-bg-1: #FFF4E6;
    --c-bg-2: #FFE4D6;
    --c-bg-3: #FFD4E5;
    --c-ink: #3D2C5C;
    --c-gold: #FFB627;
    --c-1: #FF8FA3;
    --c-2: #FFD166;
    --c-3: #95D5B2;
    --c-4: #8ECAE6;
    --c-5: #C8B6FF;
    --c-6: #FFB084;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
    font-family: 'Fredoka', sans-serif;
    color: var(--c-ink);
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background:
      radial-gradient(circle at 18% 22%, var(--c-bg-3) 0%, transparent 45%),
      radial-gradient(circle at 82% 78%, var(--c-bg-2) 0%, transparent 45%),
      var(--c-bg-1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 8px;
    position: relative;
  }

  /* Decorative background bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }
  .b1 { width: 240px; height: 240px; background: var(--c-3); top: -60px; left: -70px; }
  .b2 { width: 180px; height: 180px; background: var(--c-5); bottom: 8%; right: -50px; }
  .b3 { width: 110px; height: 110px; background: var(--c-1); top: 28%; right: 6%; opacity: 0.2; }
  .b4 { width: 90px;  height: 90px;  background: var(--c-4); bottom: 32%; left: 8%; opacity: 0.25; }

  header {
    text-align: center;
    z-index: 2;
    padding: 4px 0 2px;
    width: 100%;
  }
  h1 {
    font-family: 'Bagel Fat One', cursive;
    font-size: clamp(34px, 6.5vw, 54px);
    color: var(--c-ink);
    letter-spacing: -1px;
    line-height: 1;
    text-shadow: 3px 3px 0 var(--c-gold);
  }
  .subtitle {
    font-size: clamp(13px, 2vw, 17px);
    font-weight: 500;
    opacity: 0.65;
    margin-top: 6px;
  }

  /* Case toggle, top right */
  .case-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    background: white;
    border: 3px solid var(--c-ink);
    border-radius: 999px;
    padding: 4px;
    display: flex;
    gap: 2px;
    box-shadow: 3px 3px 0 var(--c-ink);
    z-index: 10;
  }
  .case-toggle button {
    border: none;
    background: transparent;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--c-ink);
    transition: background 0.2s;
  }
  .case-toggle button.active { background: var(--c-gold); }

  /* Mute slider (top-left) */
  .mute-slider {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 64px;
    height: 38px;
    background: var(--c-gold);
    border: 3px solid var(--c-ink);
    border-radius: 999px;
    padding: 0;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--c-ink);
    z-index: 10;
    transition: background 0.25s;
  }
  .mute-slider.muted { background: #cfcfd4; }
  .mute-knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 28px;
    height: 28px;
    background: white;
    border: 2px solid var(--c-ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1;
    transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .mute-slider.muted .mute-knob {
    left: calc(100% - 28px - 4px);
  }

  /* Range selector */
  .range-selector {
    display: flex;
    gap: 4px;
    justify-content: center;
    align-items: center;
    z-index: 2;
    padding: 4px;
    background: white;
    border-radius: 999px;
    border: 3px solid var(--c-ink);
    box-shadow: 4px 4px 0 var(--c-ink);
    margin-top: 6px;
    flex-wrap: wrap;
    max-width: calc(100vw - 32px);
  }
  .range-btn {
    border: none;
    background: transparent;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: clamp(13px, 2.2vw, 16px);
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--c-ink);
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .range-btn.active {
    background: var(--c-gold);
  }
  .range-btn:active {
    transform: scale(0.94);
  }

  /* Progress strip */
  .progress {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    z-index: 2;
    padding: 8px 18px;
    background: white;
    border-radius: 999px;
    border: 3px solid var(--c-ink);
    box-shadow: 4px 4px 0 var(--c-ink);
    margin-top: 8px;
  }
  .progress-letter {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 3.6vw, 26px);
    min-width: 26px;
    text-align: center;
    opacity: 0.3;
    transition: all 0.3s;
  }
  .progress-letter.done {
    opacity: 1;
    color: var(--c-gold);
    transform: scale(1.1);
  }
  .progress-letter.next {
    opacity: 1;
    color: var(--c-ink);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }

  /* Game area */
  .game-area {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 640px;
    min-height: 0;
    padding: 12px 0;
  }
  .grid-wrap {
    position: relative;
    aspect-ratio: 3 / 2;
    width: 100%;
    max-height: 100%;
  }
  .path-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .path-line {
    fill: none;
    stroke: var(--c-gold);
    stroke-width: 16;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,0.18));
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
  }
  .tile {
    background: var(--tile-color, white);
    border: 4px solid var(--c-ink);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(56px, 14vw, 110px);
    color: var(--c-ink);
    cursor: pointer;
    box-shadow: 6px 6px 0 var(--c-ink);
    transition: transform 0.12s ease-out, box-shadow 0.12s ease-out;
    position: relative;
    overflow: hidden;
    padding: 0;
    font-family: inherit;
  }
  .tile:active {
    transform: translate(3px, 3px);
    box-shadow: 3px 3px 0 var(--c-ink);
  }
  .tile.done {
    background: white !important;
    color: var(--c-gold);
    animation: bounce 0.45s ease-out;
  }
  .tile.done::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 20px;
    box-shadow: inset 0 0 0 4px var(--c-gold);
    pointer-events: none;
  }
  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18) rotate(-4deg); }
    70%  { transform: scale(0.96) rotate(2deg); }
    100% { transform: scale(1); }
  }
  .tile.shake { animation: shake 0.45s ease-in-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-10px) rotate(-3deg); }
    40%      { transform: translateX(8px) rotate(2deg); }
    60%      { transform: translateX(-6px) rotate(-2deg); }
    80%      { transform: translateX(4px) rotate(1deg); }
  }

  /* Celebration */
  .celebration {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .celebration.show { opacity: 1; }
  .celebration-text {
    font-family: 'Bagel Fat One', cursive;
    font-size: clamp(56px, 14vw, 140px);
    color: var(--c-gold);
    text-shadow: 5px 5px 0 var(--c-ink);
    transform: scale(0);
  }
  .celebration.show .celebration-text {
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes pop {
    0%   { transform: scale(0) rotate(-15deg); }
    60%  { transform: scale(1.2) rotate(6deg); }
    100% { transform: scale(1) rotate(-2deg); }
  }

  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
  }

  footer {
    text-align: center;
    z-index: 2;
    padding: 4px 0 2px;
    font-size: 13px;
    opacity: 0.45;
    font-weight: 500;
  }
</style>
</head>
<body>
  <!-- Decorative bubbles -->
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
  <div class="bubble b4"></div>

  <header>
    <h1>Alphabet Trail</h1>
    <div class="subtitle">Tap the letters in order!</div>
  </header>

  <button class="mute-slider" id="mute-toggle" type="button" aria-label="Speech on (tap to mute)">
    <span class="mute-knob" id="mute-knob">🔊</span>
  </button>

  <div class="case-toggle" role="group" aria-label="Letter case">
    <button id="upper-btn" class="active" type="button">Aa</button>
    <button id="lower-btn" type="button">ab</button>
  </div>

  <div class="range-selector" id="range-selector"></div>

  <div class="progress" id="progress"></div>

  <div class="game-area">
    <div class="grid-wrap">
      <svg class="path-svg" id="path-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <polyline class="path-line" id="path-line" points="" />
      </svg>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <footer>Made with 💛 for little learners</footer>

  <div class="celebration" id="celebration">
    <div class="celebration-text" id="celebration-text">Yay!</div>
  </div>

  <canvas id="confetti-canvas"></canvas>

<script>
(function() {
  'use strict';

  // ==================== Config ====================
  const ROWS = 2;
  const COLS = 3;
  const TOTAL = ROWS * COLS;
  const TILE_COLORS = [
    'var(--c-1)', 'var(--c-2)', 'var(--c-3)',
    'var(--c-4)', 'var(--c-5)', 'var(--c-6)'
  ];
  const CELEBRATIONS = ['Yay!', 'Wow!', 'Yes!', 'Bravo!', 'Hooray!', 'Wonderful!', 'Amazing!', 'You did it!'];
  // Overlapping ranges so each sequence starts with the prior one's ending letter
  // A-F, F-K, K-P, P-U, U-Z — covers A through Z with linking letters
  const PUZZLE_STARTS = ['A', 'F', 'K', 'P', 'U'];

  // Phonetic spellings so the TTS engine says the letter NAME (American English),
  // not its sound-value or some odd default ("aitch" not "atch", etc.)
  const LETTER_SOUNDS = {
    A: 'ay',   B: 'bee',  C: 'see',  D: 'dee',  E: 'ee',         F: 'eff',
    G: 'jee',  H: 'aitch', I: 'eye',  J: 'jay',  K: 'kay',        L: 'ell',
    M: 'em',   N: 'en',   O: 'oh',   P: 'pee',  Q: 'cue',        R: 'are',
    S: 'ess',  T: 'tee',  U: 'you',  V: 'vee',  W: 'double you', X: 'ex',
    Y: 'why',  Z: 'zee'
  };

  // ==================== State ====================
  let letterCase = 'upper';            // 'upper' or 'lower'
  let speechMuted = false;             // toggled by the mute slider
  let puzzleIdx = 0;                   // index into PUZZLE_STARTS
  let currentLetters = [];             // 6 letters for current puzzle, in alphabet order
  let gridArrangement = new Array(TOTAL); // letter at each grid cell
  let pathOrder = [];                  // grid cell indices, in alphabet order
  let nextIdx = 0;                     // how many letters have been tapped correctly
  let isAnimating = false;

  // ==================== Hamiltonian path generator ====================
  function neighbors(i) {
    const r = Math.floor(i / COLS), c = i % COLS;
    const result = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
          result.push(nr * COLS + nc);
        }
      }
    }
    return result;
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function findRandomHamiltonianPath() {
    function dfs(path, visited) {
      if (path.length === TOTAL) return path;
      const last = path[path.length - 1];
      const candidates = shuffle(neighbors(last).filter(n => !visited.has(n)));
      for (const next of candidates) {
        visited.add(next);
        path.push(next);
        const result = dfs(path, visited);
        if (result) return result;
        path.pop();
        visited.delete(next);
      }
      return null;
    }
    const start = Math.floor(Math.random() * TOTAL);
    return dfs([start], new Set([start]));
  }

  // ==================== Puzzle generation ====================
  function generatePuzzle() {
    const startChar = PUZZLE_STARTS[puzzleIdx];
    currentLetters = [];
    for (let i = 0; i < 6; i++) {
      currentLetters.push(String.fromCharCode(startChar.charCodeAt(0) + i));
    }
    pathOrder = findRandomHamiltonianPath();
    gridArrangement = new Array(TOTAL);
    for (let i = 0; i < 6; i++) {
      gridArrangement[pathOrder[i]] = currentLetters[i];
    }
    nextIdx = 0;
  }
  function nextPuzzle() {
    // Stay on the current range — regenerate with a fresh random path
    generatePuzzle();
    renderAll();
  }
  function selectRange(idx) {
    if (isAnimating) return;
    if (idx === puzzleIdx) {
      // Tapping the active range replays it with a new path
      generatePuzzle();
      renderAll();
      return;
    }
    puzzleIdx = idx;
    generatePuzzle();
    renderAll();
  }

  // ==================== Rendering ====================
  function displayLetter(L) {
    return letterCase === 'upper' ? L.toUpperCase() : L.toLowerCase();
  }
  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const doneSet = new Set(pathOrder.slice(0, nextIdx));
    gridArrangement.forEach((letter, i) => {
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.type = 'button';
      tile.dataset.idx = String(i);
      tile.dataset.letter = letter;
      tile.style.setProperty('--tile-color', TILE_COLORS[i % TILE_COLORS.length]);
      tile.textContent = displayLetter(letter);
      if (doneSet.has(i)) tile.classList.add('done');
      tile.addEventListener('click', () => handleTap(i));
      grid.appendChild(tile);
    });
    // Wait for layout, then redraw path
    requestAnimationFrame(() => requestAnimationFrame(updatePath));
  }
  function renderProgress() {
    const progress = document.getElementById('progress');
    progress.innerHTML = '';
    currentLetters.forEach((L, i) => {
      const span = document.createElement('span');
      span.className = 'progress-letter';
      if (i < nextIdx) span.classList.add('done');
      else if (i === nextIdx) span.classList.add('next');
      span.textContent = displayLetter(L);
      progress.appendChild(span);
    });
  }
  function updatePath() {
    const svg = document.getElementById('path-svg');
    const line = document.getElementById('path-line');
    const grid = document.getElementById('grid');
    if (!grid || !svg || !line) return;
    if (nextIdx < 2) { line.setAttribute('points', ''); return; }
    const rect = grid.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
    const tiles = grid.querySelectorAll('.tile');
    const points = [];
    for (let i = 0; i < nextIdx; i++) {
      const gridIdx = pathOrder[i];
      const tile = tiles[gridIdx];
      if (!tile) continue;
      const tr = tile.getBoundingClientRect();
      const cx = tr.left - rect.left + tr.width / 2;
      const cy = tr.top - rect.top + tr.height / 2;
      points.push(`${cx},${cy}`);
    }
    line.setAttribute('points', points.join(' '));
  }
  function renderRangeSelector() {
    const sel = document.getElementById('range-selector');
    sel.innerHTML = '';
    PUZZLE_STARTS.forEach((start, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'range-btn';
      if (i === puzzleIdx) btn.classList.add('active');
      const endChar = String.fromCharCode(start.charCodeAt(0) + 5);
      btn.textContent = `${start}-${endChar}`;
      btn.addEventListener('click', () => selectRange(i));
      sel.appendChild(btn);
    });
  }
  function renderAll() {
    renderRangeSelector();
    renderProgress();
    renderGrid();
  }

  // ==================== Speech (Web Speech API) ====================
  function pickVoice() {
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    return voices.find(v => /samantha|karen|tessa|moira|allison|ava|female/i.test(v.name) && /en/i.test(v.lang))
        || voices.find(v => /en-US|en_US/i.test(v.lang))
        || voices.find(v => /^en/i.test(v.lang))
        || voices[0];
  }
  function speak(text, opts) {
    if (speechMuted) return;
    if (!('speechSynthesis' in window)) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = (opts && opts.rate) || 0.85;
      u.pitch = (opts && opts.pitch) || 1.2;
      u.volume = 1;
      const v = pickVoice();
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    } catch (e) { /* ignore */ }
  }

  // ==================== Audio (Web Audio API) ====================
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playPop() {
    const ctx = getCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  }
  function playWrong() {
    const ctx = getCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(160, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  }
  function playChime() {
    const ctx = getCtx(); if (!ctx) return;
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.11;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.5);
    });
  }

  // ==================== Tap handling ====================
  function handleTap(idx) {
    if (isAnimating) return;
    getCtx(); // ensure audio context exists (user gesture)
    const tile = document.querySelector(`.tile[data-idx="${idx}"]`);
    if (!tile) return;
    const tappedLetter = gridArrangement[idx];
    const expectedLetter = currentLetters[nextIdx];

    if (tappedLetter === expectedLetter) {
      tile.classList.add('done');
      const phonetic = LETTER_SOUNDS[tappedLetter.toUpperCase()] || tappedLetter;
      speak(phonetic);
      playPop();
      nextIdx++;
      renderProgress();
      requestAnimationFrame(() => requestAnimationFrame(updatePath));
      if (nextIdx === currentLetters.length) celebrate();
    } else {
      tile.classList.remove('shake');
      void tile.offsetWidth;
      tile.classList.add('shake');
      playWrong();
      setTimeout(() => tile.classList.remove('shake'), 500);
    }
  }

  // ==================== Celebration ====================
  function celebrate() {
    isAnimating = true;
    const celebration = document.getElementById('celebration');
    const text = document.getElementById('celebration-text');
    const word = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
    text.textContent = word;
    celebration.classList.add('show');
    playChime();
    launchConfetti();
    setTimeout(() => speak(word, { rate: 0.95, pitch: 1.3 }), 350);

    setTimeout(() => {
      celebration.classList.remove('show');
      isAnimating = false;
      nextPuzzle();
    }, 3200);
  }

  // ==================== Confetti ====================
  const canvas = document.getElementById('confetti-canvas');
  const cctx = canvas.getContext('2d');
  let confettiParticles = [];
  let confettiAnimating = false;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();

  function launchConfetti() {
    const colors = ['#FF8FA3','#FFD166','#95D5B2','#8ECAE6','#C8B6FF','#FFB084','#FFB627'];
    const count = 140;
    const w = window.innerWidth, h = window.innerHeight;
    for (let i = 0; i < count; i++) {
      confettiParticles.push({
        x: w / 2 + (Math.random() - 0.5) * 220,
        y: h / 2,
        vx: (Math.random() - 0.5) * 18,
        vy: (Math.random() - 1) * 16 - 5,
        gravity: 0.42,
        size: 8 + Math.random() * 10,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.32,
        shape: Math.random() < 0.5 ? 'rect' : 'circle'
      });
    }
    if (!confettiAnimating) animateConfetti();
  }
  function animateConfetti() {
    confettiAnimating = true;
    cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    confettiParticles = confettiParticles.filter(p => {
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.vx *= 0.99;
      if (p.y > window.innerHeight + 30) return false;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        cctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
      } else {
        cctx.beginPath();
        cctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        cctx.fill();
      }
      cctx.restore();
      return true;
    });
    if (confettiParticles.length > 0) {
      requestAnimationFrame(animateConfetti);
    } else {
      confettiAnimating = false;
      cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }
  }

  // ==================== Mute slider ====================
  const muteSlider = document.getElementById('mute-toggle');
  const muteKnob = document.getElementById('mute-knob');
  muteSlider.addEventListener('click', () => {
    speechMuted = !speechMuted;
    if (speechMuted) {
      muteSlider.classList.add('muted');
      muteKnob.textContent = '🔇';
      muteSlider.setAttribute('aria-label', 'Speech muted (tap to unmute)');
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    } else {
      muteSlider.classList.remove('muted');
      muteKnob.textContent = '🔊';
      muteSlider.setAttribute('aria-label', 'Speech on (tap to mute)');
    }
  });

  // ==================== Case toggle ====================
  document.getElementById('upper-btn').addEventListener('click', () => {
    if (letterCase === 'upper') return;
    letterCase = 'upper';
    document.getElementById('upper-btn').classList.add('active');
    document.getElementById('lower-btn').classList.remove('active');
    renderAll();
  });
  document.getElementById('lower-btn').addEventListener('click', () => {
    if (letterCase === 'lower') return;
    letterCase = 'lower';
    document.getElementById('lower-btn').classList.add('active');
    document.getElementById('upper-btn').classList.remove('active');
    renderAll();
  });

  // ==================== Resize handling ====================
  let resizeTimer;
  window.addEventListener('resize', () => {
    resizeCanvas();
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(updatePath, 80);
  });

  // ==================== Speech voice loading ====================
  if ('speechSynthesis' in window) {
    // Some browsers populate voices async
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { /* voices available */ };
  }

  // ==================== Boot ====================
  generatePuzzle();
  renderAll();

})();
</script>
</body>
</html>
